<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container principal do seletor -->
    <div class="seletor-caracteres">
        <h2 class="titulo-seletor">Numero de caracteres</h2>

            <button class="botao-menos">-</button>

            <button class="botao-mais">+</button>
        </div>
    </div>

    <!-- Vínculo com o arquivo JavaScript no final do body -->
    <script src="main.js"></script>
</body>
</html>
